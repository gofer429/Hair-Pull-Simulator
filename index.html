<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Symulator wyrywania włosów z dolnej części ucha</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    canvas {
      background: #222;
      border-radius: 12px;
      cursor: crosshair;
    }
    #counter {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="counter">Wyrwane włosy: 0</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const counterEl = document.getElementById('counter');

    let hairs = [];
    let pulled = 0;

    function generateHairs() {
      for (let i = 0; i < 25; i++) {
        hairs.push({
          x: 200 + Math.random() * 80 - 40,
          y: 260 + Math.random() * 80 - 40,
          length: 20 + Math.random() * 20,
          pulled: false
        });
      }
    }

    function drawEar() {
      ctx.fillStyle = '#f2c6a0';
      ctx.beginPath();
      ctx.arc(200, 200, 100, 0, Math.PI * 2);
      ctx.fill();

      // dolna część ucha
      ctx.fillStyle = '#e0a97f';
      ctx.beginPath();
      ctx.arc(200, 280, 40, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHairs() {
      ctx.strokeStyle = '#000';
      hairs.forEach(h => {
        if (!h.pulled) {
          ctx.beginPath();
          ctx.moveTo(h.x, h.y);
          ctx.lineTo(h.x, h.y - h.length);
          ctx.stroke();
        }
      });
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      hairs.forEach(h => {
        if (!h.pulled) {
          const dx = mx - h.x;
          const dy = my - h.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 10) {
            h.pulled = true;
            pulled++;
          }
        }
      });

      counterEl.textContent = 'Wyrwane włosy: ' + pulled;
      render();
    });

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawEar();
      drawHairs();
    }

    generateHairs();
    render();
  </script>
</body>
</html>
