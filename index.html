<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Symulator wyrywania włosów z płatka ucha</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    canvas {
      background: #222;
      border-radius: 12px;
      cursor: crosshair;
    }
    #counter {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="500" height="500"></canvas>
  <div id="counter">Wyrwane włosy: 0</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const counterEl = document.getElementById('counter');

    let hairs = [];
    let pulled = 0;

    function generateHairs() {
      for (let i = 0; i < 30; i++) {
        hairs.push({
          x: 320 + Math.random() * 30 - 15,
          y: 330 + Math.random() * 20 - 10,
          length: 15 + Math.random() * 15,
          pulled: false
        });
      }
    }

    function drawHead() {
      // głowa
      ctx.fillStyle = '#f2c6a0';
      ctx.beginPath();
      ctx.arc(250, 220, 150, 0, Math.PI * 2);
      ctx.fill();

      // oko
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(200, 200, 5, 0, Math.PI * 2);
      ctx.fill();

      // ucho
      ctx.fillStyle = '#e0a97f';
      ctx.beginPath();
      ctx.ellipse(350, 260, 40, 70, 0, 0, Math.PI * 2);
      ctx.fill();

      // płatek ucha
      ctx.fillStyle = '#d9956c';
      ctx.beginPath();
      ctx.arc(350, 340, 25, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHairs() {
      ctx.strokeStyle = '#000';
      hairs.forEach(h => {
        if (!h.pulled) {
          ctx.beginPath();
          ctx.moveTo(h.x, h.y);
          ctx.lineTo(h.x, h.y - h.length);
          ctx.stroke();
        }
      });
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      hairs.forEach(h => {
        if (!h.pulled) {
          const dx = mx - h.x;
          const dy = my - h.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 10) {
            h.pulled = true;
            pulled++;
          }
        }
      });

      counterEl.textContent = 'Wyrwane włosy: ' + pulled;
      render();
    });

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawHead();
      drawHairs();
    }

    generateHairs();
    render();
  </script>
</body>
</html>
